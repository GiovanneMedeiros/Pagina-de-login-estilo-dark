<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuthFlow | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-bg" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="grid-overlay"></span>
  </div>

  <button id="themeToggle" class="theme-toggle" type="button" aria-label="Alternar tema">Alternar tema</button>

  <main class="auth-layout">
    <section class="auth-card reveal-up">
      <header class="card-header">
        <p class="eyebrow">AuthFlow</p>
        <h1>Entrar na sua conta</h1>
        <p class="subtitle">Acesse sua area logada com seguranca e fluidez.</p>
      </header>

      <form id="loginForm" novalidate>
        <div class="field-group">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" name="email" type="email" placeholder="seuemail@exemplo.com" autocomplete="email" required />
          <small class="field-feedback" id="loginEmailFeedback"></small>
        </div>

        <div class="field-group">
          <label for="loginPassword">Senha</label>
          <div class="password-wrap">
            <input id="loginPassword" name="password" type="password" placeholder="Digite sua senha" autocomplete="current-password" minlength="6" required />
            <button class="password-toggle" type="button" data-target="loginPassword" aria-label="Mostrar ou ocultar senha">Mostrar</button>
          </div>
          <small class="field-feedback" id="loginPasswordFeedback"></small>
        </div>

        <div id="loginMessage" class="message" role="status" aria-live="polite"></div>

        <button id="loginButton" class="btn btn-primary" type="submit" data-loading-text="Entrando...">Entrar</button>
      </form>

      <footer class="card-footer">
        <p>Novo por aqui? <a href="register.html">Crie sua conta</a></p>
      </footer>
    </section>
  </main>

  <script src="js/auth.js" defer></script>
  <script src="js/login.js" defer></script>
</body>
</html>
